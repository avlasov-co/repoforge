<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">RepoForge Codex handoff preview</title>
  <desc id="desc">A stylized preview of a compact Markdown handoff generated for Codex mode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="76" y="70" width="1048" height="580" rx="28" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="108" y="124" fill="#e5e7eb" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="800">Codex handoff</text>
  <text x="108" y="152" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="14">Compact, action-oriented, and built for implementation-first agents.</text>
  <rect x="108" y="184" width="984" height="418" rx="20" fill="#111827" stroke="#334155"/>
  <rect x="132" y="210" width="936" height="46" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="156" y="240" fill="#93c5fd" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700">Task</text>
  <text x="220" y="240" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">Review patch parsing, preview, apply, and validation flow.</text>
  <rect x="132" y="276" width="448" height="210" rx="16" fill="#0f172a" stroke="#334155"/>
  <rect x="612" y="276" width="456" height="210" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="156" y="308" fill="#e5e7eb" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">Inspect first</text>
  <text x="156" y="336" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">src/vscode/handoffCommands.ts</text>
  <text x="156" y="358" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">src/core/contextPack.ts</text>
  <text x="156" y="380" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">test/handoffFormatters.test.ts</text>
  <text x="156" y="412" fill="#e5e7eb" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">Validation commands</text>
  <text x="156" y="440" fill="#d1fae5" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">npm run compile</text>
  <text x="156" y="462" fill="#d1fae5" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">npm test</text>
  <text x="156" y="484" fill="#d1fae5" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">npm run package</text>
  <text x="636" y="308" fill="#e5e7eb" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">Selected context</text>
  <rect x="636" y="330" width="408" height="24" rx="12" fill="#1f2937"/>
  <rect x="636" y="330" width="298" height="24" rx="12" fill="#60a5fa"/>
  <rect x="636" y="368" width="408" height="24" rx="12" fill="#1f2937"/>
  <rect x="636" y="368" width="220" height="24" rx="12" fill="#34d399"/>
  <text x="636" y="422" fill="#e5e7eb" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">Constraints</text>
  <text x="636" y="450" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">- no network calls</text>
  <text x="636" y="472" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">- no patch application outside git apply</text>
  <text x="636" y="494" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">- keep response compact</text>
  <rect x="108" y="622" width="984" height="12" rx="6" fill="#1f2937"/>
  <rect x="108" y="622" width="648" height="12" rx="6" fill="#f59e0b"/>
</svg>
