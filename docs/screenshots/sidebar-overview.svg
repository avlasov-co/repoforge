<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">RepoForge sidebar overview</title>
  <desc id="desc">A stylized preview of the RepoForge VS Code sidebar with task, search, and mode controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="56" y="56" width="1088" height="608" rx="28" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <rect x="84" y="86" width="240" height="548" rx="20" fill="url(#panel)" stroke="#374151" stroke-width="1.5"/>
  <rect x="348" y="86" width="768" height="548" rx="20" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="106" y="114" width="120" height="28" rx="14" fill="url(#accent)"/>
  <text x="166" y="133" fill="#ffffff" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" text-anchor="middle">RepoForge</text>
  <text x="106" y="184" fill="#e5e7eb" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">Task</text>
  <rect x="106" y="198" width="192" height="92" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="124" y="226" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">Refactor patch flow</text>
  <text x="124" y="248" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">and validate apply</text>
  <text x="106" y="326" fill="#e5e7eb" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">File search</text>
  <rect x="106" y="340" width="192" height="40" rx="12" fill="#0b1220" stroke="#334155"/>
  <rect x="106" y="396" width="192" height="40" rx="12" fill="#0b1220" stroke="#334155"/>
  <rect x="106" y="452" width="192" height="40" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="124" y="365" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="13">src/core/contextPack.ts</text>
  <text x="124" y="421" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="13">src/vscode/handoffCommands.ts</text>
  <text x="124" y="477" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="13">test/handoffFormatters.test.ts</text>
  <rect x="372" y="118" width="720" height="64" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="396" y="150" fill="#e2e8f0" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">Sidebar workflow preview</text>
  <text x="396" y="170" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="13">Task entry, search, include modes, and handoff selection in one view.</text>
  <rect x="372" y="208" width="336" height="160" rx="18" fill="#0b1220" stroke="#334155"/>
  <rect x="732" y="208" width="360" height="160" rx="18" fill="#0b1220" stroke="#334155"/>
  <rect x="372" y="392" width="336" height="180" rx="18" fill="#0b1220" stroke="#334155"/>
  <rect x="732" y="392" width="360" height="180" rx="18" fill="#0b1220" stroke="#334155"/>
  <text x="396" y="240" fill="#e5e7eb" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">Include modes</text>
  <text x="396" y="266" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="13">full file / codemap / snippet</text>
  <text x="756" y="240" fill="#e5e7eb" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">Handoff modes</text>
  <text x="756" y="266" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="13">Codex / Local Qwen / Continue</text>
  <text x="396" y="430" fill="#e5e7eb" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">Live budget</text>
  <rect x="396" y="454" width="264" height="16" rx="8" fill="#1f2937"/>
  <rect x="396" y="454" width="174" height="16" rx="8" fill="url(#accent)"/>
  <text x="396" y="512" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="13">Compact, inspectable context before handoff.</text>
  <text x="756" y="430" fill="#e5e7eb" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">Actions</text>
  <rect x="756" y="452" width="120" height="36" rx="10" fill="#1d4ed8"/>
  <rect x="892" y="452" width="120" height="36" rx="10" fill="#059669"/>
  <rect x="1028" y="452" width="40" height="36" rx="10" fill="#334155"/>
  <text x="816" y="475" fill="#ffffff" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Generate</text>
  <text x="952" y="475" fill="#ffffff" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Copy</text>
  <text x="1048" y="475" fill="#ffffff" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="middle">…</text>
</svg>
